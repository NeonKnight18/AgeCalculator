<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Age calculator app</title>

</head>
<body>
<form action="">
  <div class="input-container">
    <div class="input-items-container">
       <div class="input-item">
      <label for="day">Day</label>
      <input type="number" id="day" placeholder="DD" required>
      <small class="error-day"></small>
    </div>
    <div class="input-item">
      <label for="month">Month</label>
      <input type="number" id="month" placeholder="MM" required>
      <small class="error-month"></small>
    </div>
    <div class="input-item">
      <label for="year">Year</label>
      <input type="number" id="year" placeholder="YYYY" required>
      <small class="error-year">


      </small>
    </div>
    </div>
    <div class="submit-btn">
      <button type="submit" id="btn">
        <img src="/images/icon-arrow.svg" alt="arrow icon">
      </button>
    </div>

  </form>

    <div class="result">
      <h1><i><span id="year-result">--</span>years</i></h1>
      <h1><i><span id="month-result">--</span>months</i></h1>
      <h1><i><span id="day-result">--</span>days</i></h1>
    </div>
  
  </div>

<script src="script.js"></script>
  </body>
</html>
